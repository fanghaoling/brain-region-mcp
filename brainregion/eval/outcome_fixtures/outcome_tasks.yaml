- id: oc-006-debugging-oom
  task_type: consult
  difficulty: complex
  input:
    problem: "Production failure after deploy: OOM, DB connections stuck and not released. Bug in the pool cleanup path; can't reproduce the error in staging, only under load."
    why_stuck: "Can't repro in staging; only happens under sustained load."
    question: "Where's the connection leak, and what's the smallest repro?"
  gold_regions: [debugging]
  seed_memory:
    - summary: "连接池泄漏：异常路径未释放 + 健康检查缺失"
      details: "OOM + 连接耗尽根因常是池里连接在异常路径未 close。修：try-with-resources / finally 释放；testOnBorrow 健康检查剔除死连接；按 tenant 限流。压测才能复现。"
      triggers: ["OOM", "leak", "connection", "pool", "release", "内存", "连接", "泄漏", "stuck", "deploy"]
      region: "debugging"
  notes: "debugging→[debugger]。crash/bug/leak。seed_memory 给 routed+memory 正信号（连接泄漏经验命中）。"

- id: oc-007-debugging-deadlock
  task_type: consult
  difficulty: complex
  input:
    problem: "Bug: intermittent deadlock between two locks in the order service; stuck threads under certain interleavings, hard to reproduce in tests."
    question: "What lock ordering fix removes the deadlock without hurting throughput?"
  gold_regions: [debugging]
  seed_memory:
    - summary: "两把锁死锁：固定全局锁序消除循环等待"
      details: "order service 两把锁在某些交错下死锁；根因 lockA→lockB 与 lockB→lockA 并存。固定全局锁序（始终先 A 后 B）+ tryLock 超时回退消除死锁，吞吐不变。"
      triggers: ["deadlock", "lock", "intermittent", "死锁", "锁", "交错", "stuck"]
      region: "debugging"
  notes: "debugging→[debugger]。deadlock/intermittent。seed_memory 给 routed+memory 正信号（锁序经验命中）。"


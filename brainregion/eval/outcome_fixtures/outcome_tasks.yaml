- id: oc-021-debugging-cache-stampede
  task_type: consult
  difficulty: complex
  input:
    problem: "Bug: cache stampede on hot key expiry — thundering herd rebuilds overload the DB; intermittent outage right after cache TTL."
    why_stuck: "Adding TTL randomness didn't fully stop it; still see DB spikes on expiry."
    question: "What's the robust fix, and how to test it under load?"
  gold_regions: [debugging]
  seed_memory:
    - summary: "缓存击穿：singleflight/mutex 合并重建 + 提前续期"
      details: "cache stampede 根因是热 key 过期瞬间大量请求并发重建。修：singleflight（同 key 只一个重建，其余等结果）/ mutex；或 jitter + 后台异步提前续期。压测用突增并发 + 强制过期。"
      triggers: ["cache", "stampede", "thundering", "herd", "TTL", "expiry", "DB", "缓存", "击穿", "overload"]
      region: "debugging"
  notes: "debugging→[debugger]。seed_memory 正信号（singleflight 命中）。"

- id: oc-022-perf-serialization
  task_type: consult
  difficulty: complex
  input:
    problem: "Performance: JSON serialization is the hotspot in the hot path — CPU profiles show the serializer dominating under load, plus GC pressure from allocations."
    goal: "Cut serialization CPU + GC; weigh streaming vs schema-based vs zero-copy."
  gold_regions: [performance]
  seed_memory:
    - summary: "序列化热点：schema 代码生成替代反射 + 流式 + 复用 buffer"
      details: "JSON 序列化吃 CPU 常是反射 + 中间字符串分配。修：换 schema-based 代码生成序列化器（编译期，零反射）、流式写出到 buffer 避免中间 string、复用 buffer 降 GC。量化用 flame graph 对比 before/after。"
      triggers: ["serialization", "JSON", "CPU", "GC", "hot", "反射", "序列化", "allocation", "性能", "serializer"]
      region: "performance"
  notes: "performance→[performance,critic]。seed_memory 正信号。"

- id: oc-023-security-csrf
  task_type: consult
  difficulty: complex
  input:
    problem: "Security review before launch: state-changing endpoints lack CSRF protection; need to challenge the auth boundary and injection surface for cross-site request forgery."
    question: "Where are the real CSRF risks and what tests prove they're closed?"
  gold_regions: [security]
  seed_memory:
    - summary: "CSRF：SameSite + 同源 token + 幂等性检查"
      details: "CSRF 防护三层：Cookie 设 SameSite=Lax/Strict（挡多数）、对 state-changing 请求校验同源 token（double-submit / 同步器模式）、敏感操作加幂等性/二次确认。GET 必须 idempotent。测试用跨站伪造请求验证被拒。"
      triggers: ["CSRF", "cross-site", "forgery", "SameSite", "token", "cookie", "越权", "auth", "security", "launch"]
      region: "security"
  notes: "security→[challenge,critic]。seed_memory 正信号。"

- id: oc-024-planning-schema-refactor
